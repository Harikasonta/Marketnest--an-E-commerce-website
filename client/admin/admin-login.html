<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<nav class="navbar navbar-dark bg-dark">
  <div class="container">

    <!-- LOGO -->
    <a class="navbar-brand" href="dashboard.html">
      🛠 Admin Panel
    </a>

    <!-- NAV LINKS -->
    <div class="d-flex align-items-center gap-3">

      <a href="dashboard.html" class="text-white text-decoration-none">
        📊 Dashboard
      </a>

      <a href="products.html" class="text-info text-decoration-none">
        🛍 Products
      </a>

      <a href="orders.html" class="text-white text-decoration-none">
        📦 Orders
      </a>

      <!-- ADMIN NAME -->
      <span class="text-warning fw-bold" id="adminName">
        Hi, Admin
      </span>

      <!-- LOGOUT -->
      <button onclick="logout()" class="btn btn-danger btn-sm">
        Logout
      </button>

    </div>
  </div>
</nav>
<body class="bg-dark d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="card p-4" style="width:350px;">
  <h4 class="text-center mb-3">Admin Login 🔐</h4>

  <input type="email" id="email" class="form-control mb-2" placeholder="Email">
  <input type="password" id="password" class="form-control mb-3" placeholder="Password">

  <button onclick="adminLogin()" class="btn btn-dark w-100">
    Login as Admin
  </button>

  <p id="msg" class="text-danger text-center mt-2"></p>
</div>

<script>
function adminLogin() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  fetch("http://localhost:5000/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  })
  .then(res => res.json())
  .then(data => {

    if (!data.user || !data.user.isAdmin) {
      document.getElementById("msg").innerText = "Not an admin account";
      return;
    }

    localStorage.setItem("token", data.token);
    localStorage.setItem("user", JSON.stringify(data.user));

    window.location.href = "admin/dashboard.html";
  });
}
</script>

</body>
</html>
