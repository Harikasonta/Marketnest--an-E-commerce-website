<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Products</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f8;
      color: #1f2933;
    }

    a {
      text-decoration: none;
    }

    .admin-nav a:hover {
      color: #0dcaf0 !important;
    }

    .page-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #e3e8ef;
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
    }

    .product-card {
      height: 100%;
      border: 1px solid #e3e8ef;
      border-radius: 8px;
      overflow: hidden;
      background: #ffffff;
    }

    .product-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #eef2f7;
    }

    .description-preview {
      min-height: 48px;
      color: #667085;
      font-size: 14px;
    }

    .stock-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      background: #ecfdf3;
      color: #027a48;
    }

    .stock-pill.low {
      background: #fff4e5;
      color: #b54708;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-dark bg-dark shadow admin-nav">
    <div class="container">
      <a class="navbar-brand fw-bold" href="dashboard.html">Admin Panel</a>

      <div class="d-flex align-items-center gap-3">
        <a href="dashboard.html" class="text-white">Dashboard</a>
        <a href="products.html" class="text-info">Products</a>
        <a href="orders.html" class="text-white">Orders</a>
        <a href="profile.html" class="text-warning fw-bold" id="adminName">Admin</a>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    <div class="page-title">
      <div>
        <p class="text-uppercase text-muted fw-bold mb-1">Catalog</p>
        <h2 class="mb-0">Manage Products</h2>
      </div>
      <a href="../products.html" class="btn btn-outline-dark btn-sm">View Store</a>
    </div>

    <section class="panel p-4 mb-4">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <h5 class="mb-0" id="formTitle">Add Product</h5>
        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="clearForm()">Clear</button>
      </div>

      <div class="row g-3">
        <div class="col-md-6">
          <label for="name" class="form-label">Product Name</label>
          <input id="name" class="form-control" placeholder="Example: Leather Bag">
        </div>

        <div class="col-md-3">
          <label for="price" class="form-label">Price</label>
          <input id="price" type="number" min="0" class="form-control" placeholder="900">
        </div>

        <div class="col-md-3">
          <label for="stock" class="form-label">Stock</label>
          <input id="stock" type="number" min="0" class="form-control" placeholder="10">
        </div>

        <div class="col-md-6">
          <label for="category" class="form-label">Category</label>
          <input id="category" class="form-control" placeholder="Accessories">
        </div>

        <div class="col-md-6">
          <label for="image" class="form-label">Product Image</label>
          <input id="image" type="file" accept="image/*" class="form-control">
        </div>

        <div class="col-12">
          <label for="description" class="form-label">Description</label>
          <textarea id="description" class="form-control" rows="4" maxlength="700" placeholder="Write a useful product description for customers and AI mode."></textarea>
          <div class="form-text">This text appears on the product detail page and helps the AI describe products accurately.</div>
        </div>
      </div>

      <div class="d-flex gap-2 mt-4">
        <button id="submitBtn" onclick="saveProduct()" class="btn btn-success">Add Product</button>
        <button type="button" onclick="clearForm()" class="btn btn-outline-secondary">Cancel</button>
      </div>
    </section>

    <section>
      <div class="d-flex align-items-center justify-content-between mb-3">
        <h5 class="mb-0">Product List</h5>
        <span class="text-muted" id="productCount">0 products</span>
      </div>

      <div id="productList" class="row g-4"></div>
    </section>
  </main>

  <script src="js/admin-products.js"></script>
</body>
</html>
