<!DOCTYPE html>
<html>
<head>
  <title>Admin - Orders</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .status-badge {
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      color: white;
    }
    .placed { background: orange; }
    .shipped { background: blue; }
    .delivered { background: green; }
  </style>
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand" href="dashboard.html">
      🛠 Admin Panel
    </a>

    <div class="d-flex gap-3">
      <a href="dashboard.html" class="text-white">📊 Dashboard</a>
      <a href="products.html" class="text-white">🛍 Products</a>
      <a href="orders.html" class="text-info">📦 Orders</a>

      <a href="profile.html" class="text-warning fw-bold" id="adminName">
        👤 Admin
      </a>
    </div>

  </div>
</nav>

<div class="container mt-4">

  <h2>📦 Manage Orders</h2>

  <!-- 🔍 SEARCH + FILTER -->
  <div class="row mt-3 mb-3">
    <div class="col-md-6">
      <input id="searchInput" class="form-control" placeholder="Search by user name...">
    </div>

    <div class="col-md-3">
      <select id="statusFilter" class="form-control">
        <option value="">All Status</option>
        <option value="Placed">Placed</option>
        <option value="Shipped">Shipped</option>
        <option value="Delivered">Delivered</option>
      </select>
    </div>
  </div>

  <div id="ordersList"></div>

  <!-- 📄 PAGINATION -->
  <div class="text-center mt-3">
    <button class="btn btn-dark me-2" onclick="prevPage()">Prev</button>
    <button class="btn btn-dark" onclick="nextPage()">Next</button>
  </div>

</div>

<script src="js/admin-orders.js"></script>

</body>
</html>
