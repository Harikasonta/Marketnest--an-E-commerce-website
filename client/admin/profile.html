<!DOCTYPE html>
<html>
<head>
  <title>Admin Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f5f5f5; }

    .card {
      border-radius: 12px;
    }

    .profile-header {
      text-align: center;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #343a40;
      color: white;
      font-size: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: auto;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark shadow">
  <div class="container">

    <a class="navbar-brand" href="dashboard.html">🛠 Admin Panel</a>

    <div class="d-flex gap-3">
      <a href="dashboard.html" class="text-white">📊 Dashboard</a>
      <a href="products.html" class="text-white">🛍 Products</a>
      <a href="orders.html" class="text-white">📦 Orders</a>

      <a href="profile.html" class="text-warning fw-bold" id="adminName">
        👤 Admin
      </a>
    </div>

  </div>
</nav>

<div class="container mt-5">

  <div class="row">

    <!-- 👤 PROFILE INFO -->
    <div class="col-md-4">
      <div class="card p-4 shadow profile-header">

        <div class="avatar" id="avatar">A</div>

        <h4 class="mt-3" id="name"></h4>
        <p class="text-muted" id="email"></p>

        <button onclick="logout()" class="btn btn-danger mt-3">
          🚪 Logout
        </button>

      </div>
    </div>

    <!-- ⚙️ SETTINGS -->
    <div class="col-md-8">

      <!-- CHANGE PASSWORD -->
      <div class="card p-4 mb-4 shadow">
        <h5>🔒 Change Password</h5>

        <input type="password" id="oldPassword" class="form-control mb-2" placeholder="Old Password">
        <input type="password" id="newPassword" class="form-control mb-2" placeholder="New Password">

        <button onclick="changePassword()" class="btn btn-dark">
          Update Password
        </button>
      </div>

      <!-- 📊 QUICK STATS -->
      <div class="card p-4 shadow">
        <h5>📊 Quick Stats</h5>

        <p>Total Orders: <strong id="totalOrders">0</strong></p>
        <p>Total Revenue: <strong id="totalRevenue">₹0</strong></p>

      </div>

    </div>

  </div>

</div>

<script src="js/admin-profile.js"></script>

</body>
</html>
