<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- 📊 CHART LIB -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark shadow">
  <div class="container">

    <a class="navbar-brand" href="dashboard.html">
      🛠 Admin Panel
    </a>

    <div class="d-flex align-items-center gap-3">
      <a href="dashboard.html" class="text-info">📊 Dashboard</a>
      <a href="products.html" class="text-white">🛍 Products</a>
      <a href="orders.html" class="text-white">📦 Orders</a>

      <a href="profile.html" class="text-warning fw-bold" id="adminName">
        👤 Admin
      </a>
    </div>

  </div>
</nav>

<div class="container mt-5">

  <h2>📊 Admin Dashboard</h2>

  <!-- CARDS -->
  <div class="row mt-4">

    <div class="col-md-4">
      <div class="card p-3 text-center shadow">
        <h6>Total Products</h6>
        <h3 id="totalProducts">0</h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3 text-center shadow">
        <h6>Total Orders</h6>
        <h3 id="totalOrders">0</h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3 text-center shadow">
        <h6>Total Revenue</h6>
        <h3 id="totalRevenue">₹0</h3>
      </div>
    </div>

  </div>

  <!-- 📈 CHART -->
  <div class="card p-4 mt-5 shadow">
    <h5>📈 Orders & Revenue Overview</h5>
    <canvas id="chart"></canvas>
  </div>
  <div class="card p-4 mt-5 shadow">
    <h5>🏆 Top Selling Products</h5>
    <ul id="topProducts" class="list-group mt-3"></ul>
  </div>

  <div class="row mt-4">

  <div class="col-md-6">
    <div class="card p-3 text-center shadow">
      <h6>UPI Revenue</h6>
      <h3 id="upiRevenue">₹0</h3>
    </div>
  </div>

  <div class="col-md-6">
    <div class="card p-3 text-center shadow">
      <h6>COD Revenue</h6>
      <h3 id="codRevenue">₹0</h3>
    </div>
  </div>

  </div>

</div>

<script src="js/admin.js"></script>

</body>
</html>
