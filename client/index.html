<!DOCTYPE html>
<html>
<head>
  <title>E-Store</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body { background-color: #f5f5f5; }

    .hero {
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
      padding: 60px 0;
      text-align: center;
    }

    .search-box {
      max-width: 500px;
      margin: 20px auto;
    }

    .card {
      border-radius: 12px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    .wishlist {
      position: absolute;
      top: 10px;
      right: 10px;
      cursor: pointer;
      color: #ccc;
      font-size: 20px;
    }

    .wishlist.active {
      color: red;
    }

    .nav-link:hover {
      color: #0dcaf0 !important;
    }
  </style>
  <link rel="stylesheet" href="css/site.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">E-Store</a>

    <div class="d-flex align-items-center gap-4">
      <a class="nav-link text-info" href="index.html">Home</a>
      <a class="nav-link text-white" href="products.html">Products</a>

      <a class="nav-link text-white" href="wishlist.html">
        <i class="fa fa-heart"></i>
      </a>

      <a class="nav-link text-white" href="cart.html">
        <i class="fa fa-shopping-cart"></i>
      </a>

      <a class="nav-link text-white" href="profile.html">
        <i class="fa fa-user"></i>
        <span id="username">Hi, User</span>

      </a>

      <a class="btn btn-info btn-sm fw-bold" href="ai/ai.html">AI Mode</a>
    </div>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Welcome to E-Shop 🛍️</h1>
  <input type="text" id="search" class="form-control search-box" placeholder="Search products...">
</div>

<!-- PRODUCTS -->
<div class="container mt-5 page-shell">
  <h2>🔥 Top Deals</h2>
  <div class="row" id="products"></div>
</div>

<script>
const BASE_URL = "http://localhost:5000";

function getToken() {
  return localStorage.getItem("token");
}

// USER NAME
const user = JSON.parse(localStorage.getItem("user"));
if (user && user.name) {
  document.getElementById("username").innerText = "Hi, " + user.name;
}

let allProducts = [];

function goToProduct(productId) {
  window.location.href = `product-detail.html?id=${productId}`;
}

// LOAD PRODUCTS
fetch(`${BASE_URL}/products`)
  .then(res => res.json())
  .then(data => {
    allProducts = data;
    displayProducts(data);
  })
  .catch(err => {
    console.error("Error loading products:", err);
  });

// DISPLAY PRODUCTS ✅ FIXED
function displayProducts(products) {
  let output = "";

  products.forEach(p => {
    output += `
      <div class="col-md-4">
        <div class="card mb-4 position-relative">

          <i class="fa fa-heart wishlist"
             onclick="toggleWishlist(this, '${p._id}')"></i>

          <img src="${p.image ? BASE_URL + p.image : 'https://picsum.photos/300'}"
               class="card-img-top"
               height="200"
               style="cursor:pointer"
               onclick="goToProduct('${p._id}')">

          <div class="card-body text-center">
            <h5 style="cursor:pointer" onclick="goToProduct('${p._id}')">${p.name}</h5>
            <p class="text-success fw-bold">₹${p.price}</p>

            <button onclick="addToCart('${p._id}')"
                    class="btn btn-dark w-100">
              Add to Cart
            </button>
          </div>
        </div>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = output;
}

// SEARCH
document.getElementById("search").addEventListener("input", function () {
  const value = this.value.toLowerCase();

  const filtered = allProducts.filter(p =>
    p.name.toLowerCase().includes(value)
  );

  displayProducts(filtered);
});

// ❤️ WISHLIST
function toggleWishlist(el, productId) {
  const token = getToken();

  if (!token) {
    alert("Login first");
    window.location.href = "login.html";
    return;
  }

  fetch(`${BASE_URL}/wishlist/${productId}`, {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token
    }
  })
  .then(res => res.json())
  .then(() => {
    el.classList.toggle("active");
  })
  .catch(() => alert("Wishlist error"));
}

// 🛒 CART
function addToCart(productId) {
  const token = getToken();

  if (!token) {
    alert("Login first");
    return;
  }

  fetch(`${BASE_URL}/cart/add`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      productId,
      quantity: 1
    })
  })
  .then(res => res.json())
  .then(() => alert("Added to cart"))
  .catch(() => alert("Cart error"));
}
</script>

</body>
</html>
