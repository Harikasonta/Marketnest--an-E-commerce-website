<!DOCTYPE html>
<html>
<head>
  <title>My Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/site.css">

  <style>
    .nav-link:hover {
      color: #0dcaf0 !important;
    }

    .profile-card {
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<!-- ✅ UPDATED NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">E-Shop</a>

    <div class="d-flex align-items-center gap-4">

      <a class="nav-link text-white" href="index.html">Home</a>

      <a class="nav-link text-white" href="products.html">Products</a>

      <a class="nav-link text-white" href="wishlist.html">
        <i class="fa fa-heart me-1"></i>
      </a>

      <a class="nav-link text-white" href="cart.html">
        <i class="fa fa-shopping-cart me-1"></i>
      </a>

      <a class="nav-link text-info" href="profile.html">
        <i class="fa fa-user me-1"></i>
        <span id="username">Hi, User</span>
      </a>

    </div>
  </div>
</nav>

<div class="container mt-4 page-shell">

  <h2 class="mb-4">👤 My Profile</h2>

  <!-- ✅ USER INFO CARD -->
  <div class="card p-4 mb-4 profile-card">

    <h5><i class="fa fa-user me-2"></i> Name: <span id="userName"></span></h5>
    <h6 class="mt-2"><i class="fa fa-envelope me-2"></i> Email: <span id="userEmail"></span></h6>

    <!-- ✅ LOGOUT BUTTON -->
    <button onclick="logout()" class="btn btn-danger mt-3">
      <i class="fa fa-sign-out-alt me-1"></i> Logout
    </button>

  </div>

  <!-- ✅ ORDERS -->
  <h4 class="mb-3">📦 My Orders</h4>
  <div id="orders"></div>

</div>

<script src="js/profile.js"></script>

<script>
// ✅ USERNAME DISPLAY IN NAVBAR
const user = JSON.parse(localStorage.getItem("user"));

if (user && user.name) {
  document.getElementById("username").innerText = "Hi, " + user.name;
}
</script>

</body>
</html>
