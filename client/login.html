<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/site.css">

  <style>
    body {
      height: 100vh;
      background: linear-gradient(135deg, #1d4350, #a43931);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      border-radius: 16px;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.95);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .form-control {
      border-radius: 10px;
    }

    .btn-dark {
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn-dark:hover {
      transform: scale(1.03);
    }
  </style>
</head>

<body class="auth-page">

<div class="col-md-4">
  <div class="card p-4 auth-card">

    <h3 class="text-center mb-3">Welcome Back 👋</h3>

    <input type="email" id="email" class="form-control mb-3" placeholder="Email" autocomplete="email" required>

    <!-- Password with eye toggle -->
    <div class="input-group mb-3">
      <input type="password" id="password" class="form-control" placeholder="Password" autocomplete="current-password" required>
      <span class="input-group-text" onclick="togglePassword()">
        <i class="fa fa-eye"></i>
      </span>
    </div>

    <button onclick="login()" id="loginBtn" class="btn btn-dark w-100">
      Login
    </button>

    <p id="msg" class="text-danger mt-2 text-center"></p>

    <p class="text-center mt-3">
      Don't have an account?
      <a href="register.html">Register</a>
    </p>

  </div>
</div>

<script src="js/login.js"></script>

<script>
function togglePassword() {
  const input = document.getElementById("password");
  input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
