<!DOCTYPE html>
<html>
<head>
  <title>Register</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/site.css">

  <style>
    body {
      height: 100vh;
      background: linear-gradient(135deg, #42275a, #734b6d);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      border-radius: 16px;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .form-control {
      border-radius: 10px;
    }

    .btn-dark {
      border-radius: 10px;
    }
  </style>
</head>

<body class="auth-page">

<div class="col-md-4">
  <div class="card p-4 auth-card">

    <h3 class="text-center mb-3">Create Account 🚀</h3>

    <input type="text" id="name" class="form-control mb-3" placeholder="Name">
    <input type="email" id="email" class="form-control mb-3" placeholder="Email" autocomplete="email" required>
    <input type="password" id="password" class="form-control mb-3" placeholder="Password" minlength="6" autocomplete="new-password" required>

    <button onclick="register()" id="registerBtn" class="btn btn-dark w-100">
      Register
    </button>

    <p id="msg" class="text-center mt-2 text-danger"></p>

    <p class="text-center mt-3">
      Already have an account?
      <a href="login.html">Login</a>
    </p>

  </div>
</div>

<script src="js/register.js"></script>

</body>
</html>
