<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Mode - E-Shop</title>
  <link rel="stylesheet" href="ai.css">
</head>
<body>
  <main class="container">
    <header class="header">
      <div>
        <p class="eyebrow">AI Mode</p>
        <h1>Shop with your assistant</h1>
      </div>
      <button type="button" onclick="goHome()">Back</button>
    </header>

    <section id="chatBox" class="chat-box" aria-live="polite"></section>

    <section id="inputWrapper" class="center-input">
      <input
        type="text"
        id="userInput"
        placeholder="Try: recommend phones under 50000"
        autocomplete="off"
      >
      <button type="button" onclick="sendMessage()">Send</button>
    </section>
  </main>

  <script src="ai.js"></script>
</body>
</html>
