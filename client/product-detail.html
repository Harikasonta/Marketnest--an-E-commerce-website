<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      background: #f5f5f5;
    }

    .nav-link:hover {
      color: #0dcaf0 !important;
    }

    .detail-card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .product-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #eef2f7;
    }

    .similar-card {
      cursor: pointer;
      border-radius: 8px;
      transition: 0.2s;
      height: 100%;
    }

    .similar-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
    }

    .similar-card img {
      height: 180px;
      object-fit: cover;
    }
  </style>
  <link rel="stylesheet" href="css/site.css">
</head>

<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">E-Shop</a>

      <div class="d-flex align-items-center gap-4">
        <a class="nav-link text-white" href="index.html">Home</a>
        <a class="nav-link text-white" href="products.html">Products</a>
        <a class="nav-link text-white" href="wishlist.html">
          <i class="fa fa-heart me-1"></i>
        </a>
        <a class="nav-link text-white" href="cart.html">
          <i class="fa fa-shopping-cart me-1"></i>
        </a>
        <a class="btn btn-info btn-sm fw-bold" href="ai/ai.html">AI Mode</a>
      </div>
    </div>
  </nav>

  <main class="container my-5 page-shell">
    <div id="productDetail"></div>

    <section class="mt-5">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0">Similar Products</h3>
        <a href="products.html" class="btn btn-outline-dark btn-sm">View All</a>
      </div>

      <div id="similarProducts" class="row g-4"></div>
    </section>
  </main>

  <script src="js/product-detail.js"></script>
</body>
</html>
