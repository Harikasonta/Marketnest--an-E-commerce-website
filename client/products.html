<!DOCTYPE html>
<html>
<head>
  <title>Products</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/site.css">

  <style>
    .nav-link:hover {
      color: #0dcaf0 !important;
    }
  </style>
</head>

<body>

<!-- ✅ UPDATED NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">E-Shop</a>

    <div class="d-flex align-items-center gap-4">

      <!-- Home -->
      <a class="nav-link text-white" href="index.html">Home</a>

      <!-- Products -->
      <a class="nav-link text-info" href="products.html">Products</a>

      <!-- Wishlist -->
      <a class="nav-link text-white" href="wishlist.html">
        <i class="fa fa-heart me-1"></i>
      </a>

      <!-- Cart -->
      <a class="nav-link text-white" href="cart.html">
        <i class="fa fa-shopping-cart me-1"></i>
      </a>

      <!-- Profile -->
      <a class="nav-link text-white" href="profile.html">
        <i class="fa fa-user me-1"></i>
        <span id="username">Hi, User</span>
      </a>

      <a class="btn btn-info btn-sm fw-bold" href="ai/ai.html">AI Mode</a>

    </div>
  </div>
</nav>

<div class="container mt-4 page-shell">
  <div class="row">

    <!-- 🔍 FILTER SIDEBAR -->
    <div class="col-md-3">

      <h5>Filters</h5>

      <!-- SEARCH -->
      <input type="text" id="searchInput" class="form-control mb-3" placeholder="Search product...">

      <!-- CATEGORY -->
      <h6>Category</h6>
      <select id="categoryFilter" class="form-control mb-3">
        <option value="">All</option>
      </select>

      <!-- PRICE -->
      <h6>Max Price</h6>
      <input type="range" id="priceRange" min="0" max="100000" step="1000" class="form-range">
      <p>₹<span id="priceValue">100000</span></p>

      <!-- SORT -->
      <h6>Sort By</h6>
      <select id="sortFilter" class="form-control">
        <option value="">None</option>
        <option value="low">Price: Low → High</option>
        <option value="high">Price: High → Low</option>
      </select>

    </div>

    <!-- 🛍 PRODUCTS -->
    <div class="col-md-9">
      <div class="row" id="productList"></div>
    </div>

  </div>
</div>

<script src="js/products.js"></script>

<script>
// ✅ USER NAME DISPLAY
const user = JSON.parse(localStorage.getItem("user"));

if (user && user.name) {
  document.getElementById("username").innerText = "Hi, " + user.name;
}
</script>

</body>
</html>
